name: Generate Weekly Gallery

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate gallery images
        run: node scripts/generate-gallery.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit new images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add neon_horizon.png vhs_dreams.png retro_highway.png city_of_lights.png laser_palm.png magenta_sky.png
          git diff --cached --quiet || git commit -m "chore: weekly gallery refresh [skip ci]"
          git push
