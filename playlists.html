<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlists — Sunwave Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Oxanium:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans text-white bg-[#071018] relative overflow-x-hidden antialiased">

  <!-- OVERLAYS -->
  <div class="scanlines"></div>
  <div class="retrowave-grid"></div>

  <!-- NAVBAR -->
  <header class="sticky top-0 z-50 backdrop-blur-xl bg-black/40 border-b border-white/10">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
      <a href="./index.html" class="flex items-center gap-3 group cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 64 64" role="img" aria-label="Sunwave Logo" class="sunset-text transform group-hover:scale-110 transition-transform duration-300">
          <title>Sunwave Logo</title>
          <defs>
            <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ff5a87"/>
              <stop offset="50%" stop-color="#ffb347"/>
              <stop offset="100%" stop-color="#fdf497"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="28" fill="url(#sunGrad)" stroke="#ffffff" stroke-width="2"/>
          <rect x="30" y="24" width="4" height="22" rx="1" fill="#071018"/>
          <path d="M32 24c8-8 18-7 24-1-8-2-14 3-16 7 6-2 12 1 14 6-8-4-14-1-18 2" fill="#071018"/>
          <path d="M32 24c-8-8-18-7-24-1 8-2 14 3 16 7-6-2-12 1-14 6 8-4 14-1 18 2" fill="#071018"/>
        </svg>
        <div class="font-black tracking-tighter text-xl">
          <span class="sunset-text">Sunwave</span>
          <span class="text-white/40"> HUB</span>
        </div>
      </a>
      <nav class="hidden md:flex items-center gap-6 text-sm font-semibold tracking-wide uppercase text-white/60">
        <a href="./index.html#music" class="hover:text-white transition-all">Musique</a>
        <a href="./index.html#visuals" class="hover:text-white transition-all">Visuels</a>
        <a href="./index.html#community" class="hover:text-white transition-all">Communauté</a>
        <a href="./index.html#events" class="hover:text-white transition-all">Événements</a>
        <a href="./index.html" class="px-5 py-2.5 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition font-black uppercase text-xs tracking-widest">
          ← Accueil
        </a>
      </nav>
    </div>
  </header>

  <!-- PAGE HEADER -->
  <section class="relative pt-16 pb-10 overflow-hidden">
    <div class="hero-glow"></div>
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="inline-block px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] font-bold tracking-[0.2em] text-white/50 uppercase mb-4">
        Communauté
      </div>
      <h1 class="text-3xl md:text-4xl font-black tracking-tighter mb-2">
        Flux <span class="sunset-text">Audio/Vidéo</span> Approuvé
      </h1>
      <p class="text-white/40 text-sm font-light">Toutes les playlists soumises par la communauté.</p>
    </div>
  </section>

  <!-- PLAYLISTS GRID -->
  <section class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 pb-24">
    <div id="playlists-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
      <p class="text-white/30 col-span-full text-center py-20 text-sm uppercase tracking-widest">Chargement...</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="border-t border-white/5 py-8 text-center text-white/20 text-[10px] font-bold tracking-[0.3em] uppercase">
    Sunwave Hub — Retrowave Community
  </footer>

  <script type="module" src="./playlists.js"></script>
</body>
</html>
